name: Déployer Behanian

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    name: Déployer sur VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/behanian
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart gunicorn
            echo "VPS mis a jour"

  deploy-local:
    name: Déployer sur serveur local
    runs-on: ubuntu-latest
    needs: deploy-vps
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement serveur local via WireGuard
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            ssh -o KexAlgorithms=curve25519-sha256 behanian@10.8.0.2 "
              cd /opt/behanian &&
              git pull origin main &&
              source venv/bin/activate &&
              pip install -r requirements.txt --quiet &&
              python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput &&
              sudo systemctl restart gunicorn &&
              echo Serveur local mis a jour
            "
