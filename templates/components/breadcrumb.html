{# templates/components/breadcrumb.html #}
<nav class="behanian-breadcrumb" aria-label="breadcrumb">
    <div class="bc-inner">
        <a href="{% url 'dashboard:index' %}" class="bc-home" title="Accueil">
            <i class="fas fa-home"></i>
        </a>
        {% for item in items %}
            <span class="bc-sep">&#x203A;</span>
            {% if item.active %}
                <span class="bc-current">{{ item.label }}</span>
            {% else %}
                <a href="{{ item.url }}" class="bc-link">{{ item.label }}</a>
            {% endif %}
        {% endfor %}
    </div>
</nav>

<style>
.behanian-breadcrumb {
    display: block;
    margin: 14px 0 8px 0;
}
.bc-inner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: white;
    border: 1px solid #eee;
    border-radius: 30px;
    padding: 6px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    font-size: 0.83rem;
    flex-wrap: wrap;
}
.bc-home {
    color: #c0392b;
    text-decoration: none;
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    transition: color 0.2s;
}
.bc-home:hover { color: #e74c3c; }
.bc-sep {
    color: #ccc;
    font-size: 0.9rem;
    user-select: none;
}
.bc-link {
    color: #c0392b;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
}
.bc-link:hover { color: #e74c3c; text-decoration: underline; }
.bc-current {
    color: #2d3748;
    font-weight: 700;
}
</style>
