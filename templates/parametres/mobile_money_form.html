{% extends 'dashboard/base_dashboard.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4" style="max-width:600px">

  <div class="mb-4">
    <h4 class="font-weight-700 mb-1" style="color:#1a2535">
      <i class="fas fa-mobile-alt mr-2 text-success"></i> {{ action }} un opérateur Mobile Money
    </h4>
  </div>

  <div class="card border-0 shadow-sm" style="border-radius:14px;padding:28px">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-group mb-3">
        <label class="font-weight-600" style="font-size:13px;color:#374151">Nom de l'opérateur *</label>
        <input type="text" name="nom" class="form-control" placeholder="Ex : Wave, Orange Money, MTN Money…"
          value="{{ operateur.nom|default:'' }}" required style="border-radius:10px;border:1.5px solid #e5e7eb">
      </div>

      <div class="form-group mb-3">
        <label class="font-weight-600" style="font-size:13px;color:#374151">Logo / Image</label>
        {% if operateur.image %}
        <div class="mb-2">
          <img src="{{ operateur.image.url }}" alt="logo" style="width:64px;height:64px;object-fit:contain;border-radius:10px;border:1px solid #e5e7eb">
          <span class="text-muted ml-2" style="font-size:12px">Image actuelle</span>
        </div>
        {% endif %}
        <input type="file" name="image" accept="image/*" class="form-control" style="border-radius:10px;border:1.5px solid #e5e7eb">
        <small class="text-muted">PNG/JPEG recommandé, fond transparent idéal. Taille max : 1 Mo.</small>
      </div>

      <div class="form-group mb-3">
        <label class="font-weight-600" style="font-size:13px;color:#374151">Ordre d'affichage</label>
        <input type="number" name="ordre" class="form-control" value="{{ operateur.ordre|default:'0' }}"
          min="0" style="border-radius:10px;border:1.5px solid #e5e7eb;max-width:120px">
        <small class="text-muted">0 = en premier</small>
      </div>

      <div class="form-group mb-4">
        <div class="custom-control custom-switch">
          <input type="checkbox" class="custom-control-input" id="actifSwitch" name="actif"
            {% if operateur.actif or not operateur %}checked{% endif %}>
          <label class="custom-control-label font-weight-600" for="actifSwitch" style="font-size:13px;color:#374151">Opérateur actif</label>
        </div>
      </div>

      <div class="d-flex gap-2" style="gap:12px">
        <button type="submit" class="btn btn-success font-weight-600">
          <i class="fas fa-save mr-1"></i> Enregistrer
        </button>
        <a href="{% url 'parametres:mobile_money_list' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
