{% extends 'dashboard/base_dashboard.html' %}

{% block content %}
<div class="container-fluid py-4" style="max-width:480px">
  <div class="card border-0 shadow-sm text-center" style="border-radius:14px;padding:40px 32px">
    <div style="font-size:3rem;margin-bottom:16px;color:#dc2626"><i class="fas fa-exclamation-triangle"></i></div>
    <h5 class="font-weight-700 mb-2">Supprimer l'opérateur</h5>
    <p class="text-muted mb-4">Confirmer la suppression de <strong>{{ operateur.nom }}</strong> ?<br>Cette action est irréversible.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger font-weight-600 mr-2">
        <i class="fas fa-trash mr-1"></i> Supprimer
      </button>
      <a href="{% url 'parametres:mobile_money_list' %}" class="btn btn-outline-secondary">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
