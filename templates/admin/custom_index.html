{% extends "admin/index.html" %}
{% block content %}
{{ block.super }}
<div style="margin-top:28px;background:linear-gradient(135deg,#1A2535,#2D3F55);border-radius:14px;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">
  <div>
    <div style="font-size:11px;font-weight:700;color:#C9A84C;margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px">⚙️ Administration Système</div>
    <div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px">🔄 Remise à Zéro des Données</div>

  </div>

    <a href="{% url 'admin:total_reset_confirm' %}"
